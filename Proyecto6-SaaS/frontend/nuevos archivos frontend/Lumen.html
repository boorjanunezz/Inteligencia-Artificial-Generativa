<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Lumen — Prepara tu entrevista</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Geist:wght@400;500;600;700&family=Instrument+Serif:ital@0;1&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="styles.css" />
</head>
<body>
  <div id="root"></div>

  <script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
  <script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
  <script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>

  <script type="text/babel" src="shared.jsx"></script>
  <script type="text/babel" src="tweaks-panel.jsx"></script>
  <script type="text/babel" src="landing.jsx"></script>
  <script type="text/babel" src="app.jsx"></script>
  <script type="text/babel" src="interview.jsx"></script>

  <script type="text/babel" data-presets="react">
    const TWEAKS = /*EDITMODE-BEGIN*/{
      "accentHue": 212,
      "accentChroma": 0.1,
      "serifAccents": true,
      "grain": true,
      "auroraIntensity": 1
    }/*EDITMODE-END*/;

    function App() {
      const { route } = useRouter();
      const tw = useTweaks(TWEAKS);
      const [tweaks] = tw;

      // Apply tweaks to root
      React.useEffect(() => {
        const root = document.documentElement;
        root.style.setProperty('--accent', `oklch(${document.documentElement.getAttribute('data-theme') === 'light' ? 0.52 : 0.72} ${tweaks.accentChroma} ${tweaks.accentHue})`);
        root.style.setProperty('--accent-strong', `oklch(${document.documentElement.getAttribute('data-theme') === 'light' ? 0.46 : 0.78} ${tweaks.accentChroma} ${tweaks.accentHue})`);
        root.style.setProperty('--accent-soft', `oklch(${document.documentElement.getAttribute('data-theme') === 'light' ? 0.52 : 0.72} ${tweaks.accentChroma} ${tweaks.accentHue} / 0.13)`);
        root.style.setProperty('--accent-line', `oklch(${document.documentElement.getAttribute('data-theme') === 'light' ? 0.52 : 0.72} ${tweaks.accentChroma} ${tweaks.accentHue} / 0.30)`);
        root.style.setProperty('--grain-opacity', tweaks.grain ? (document.documentElement.getAttribute('data-theme') === 'light' ? '0.025' : '0.04') : '0');
      }, [tweaks]);

      let screen;
      switch (route) {
        case 'landing': screen = <Landing/>; break;
        case 'login': screen = <Login/>; break;
        case 'register': screen = <Register/>; break;
        case 'dashboard': screen = <Dashboard/>; break;
        case 'new': screen = <NewSession/>; break;
        case 'interview': screen = <Interview/>; break;
        case 'results': screen = <Results/>; break;
        default: screen = <Landing/>;
      }

      return (
        <>
          {screen}
          <LumenTweaks tw={tw}/>
        </>
      );
    }

    function LumenTweaks({ tw }) {
      const [tweaks, setTweak] = tw;
      const { theme, setTheme } = React.useContext(ThemeContext);
      const { go, route } = useRouter();
      return (
        <TweaksPanel title="Tweaks">
          <TweakSection title="Tema">
            <TweakRadio label="Modo" value={theme} onChange={setTheme}
              options={[{value: 'dark', label: 'Oscuro'}, {value: 'light', label: 'Claro'}]}/>
          </TweakSection>
          <TweakSection title="Acento">
            <TweakSlider label="Tono (hue)" min={0} max={360} step={1} value={tweaks.accentHue} onChange={v => setTweak('accentHue', v)} suffix="°"/>
            <TweakSlider label="Saturación" min={0.05} max={0.30} step={0.01} value={tweaks.accentChroma} onChange={v => setTweak('accentChroma', v)}/>
          </TweakSection>
          <TweakSection title="Atmósfera">
            <TweakToggle label="Grano de papel" value={tweaks.grain} onChange={v => setTweak('grain', v)}/>
            <TweakToggle label="Acentos serif (cursiva)" value={tweaks.serifAccents} onChange={v => setTweak('serifAccents', v)}/>
          </TweakSection>
          <TweakSection title="Navegar a">
            <div style={{ display: 'grid', gridTemplateColumns: '1fr 1fr', gap: 6 }}>
              {[
                ['landing', 'Landing'],
                ['register', 'Register'],
                ['dashboard', 'Dashboard'],
                ['new', 'New session'],
                ['interview', 'Interview'],
                ['results', 'Results'],
              ].map(([id, label]) => (
                <TweakButton key={id} label={label} onClick={() => go(id)} active={route === id}/>
              ))}
            </div>
          </TweakSection>
        </TweaksPanel>
      );
    }

    function Root() {
      return (
        <ThemeProvider>
          <AuthProvider>
            <RouterProvider>
              <App/>
            </RouterProvider>
          </AuthProvider>
        </ThemeProvider>
      );
    }

    ReactDOM.createRoot(document.getElementById('root')).render(<Root/>);
  </script>
</body>
</html>
